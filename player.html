<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; background:black;">

<!-- FULLSCREEN BUTTON -->
<button onclick="goFullscreen()" 
style="position:fixed; top:10px; right:10px; z-index:10; padding:8px;">
Fullscreen
</button>

<!-- VIDEO (auto fits above bells) -->
<div style="position:relative; width:100%; height:calc(100vh - 240px); background:black;">

  <iframe 
    src="https://www.youtube.com/embed/kZQ7Whx9MKA?rel=0&playsinline=1"
    style="
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      border:0;
    "
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>

</div>

<!-- BELLS (your Construct game) -->
<iframe 
  id="gameFrame"
  src="index.html"
  style="width:100%; height:240px; border:0;"
  tabindex="0">
</iframe>

<!-- SCRIPT -->
<script>
function goFullscreen() {
  let elem = document.documentElement;
  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  }
}

// keep keyboard focus on game
window.onload = function() {
  const game = document.getElementById("gameFrame");
  game.focus();

  document.body.addEventListener("click", function() {
    game.focus();
  });
};
</script>

</body>
</html>
