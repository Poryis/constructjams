<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; background:black;">

<!-- FULLSCREEN BUTTON -->
<button onclick="goFullscreen()" 
style="position:fixed; top:10px; right:10px; z-index:10; padding:8px;">
Fullscreen
</button>

<!-- VIDEO CONTAINER (FULL WIDTH, NO BLACK BARS) -->
<div style="position:relative; width:100%; height:65vh; overflow:hidden;">

  <iframe 
    src="https://www.youtube.com/embed/kZQ7Whx9MKA?rel=0&playsinline=1"
    style="
      position:absolute;
      top:50%;
      left:50%;
      width:100vw;
      height:56.25vw;
      transform:translate(-50%, -50%);
      border:0;
    "
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>

</div>

<!-- GAME (BELLS) -->
<iframe 
  id="gameFrame"
  src="index.html"
  style="width:100%; height:35vh; border:0;"
  tabindex="0">
</iframe>

<!-- SCRIPT -->
<script>
function goFullscreen() {
  let elem = document.documentElement;
  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  }
}

// keep focus on game for keyboard
window.onload = function() {
  const game = document.getElementById("gameFrame");
  game.focus();

  document.body.addEventListener("click", function() {
    game.focus();
  });
};
</script>

</body>
</html>
