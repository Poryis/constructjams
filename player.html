<!DOCTYPE html>
<html>
<body style="margin:0; background:black;">

<!-- VIDEO (top) -->
<iframe 
  src="https://www.youtube.com/embed/kZQ7Whx9MKA?rel=0"
  style="width:100%; height:65vh; border:0;"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
  allowfullscreen>
</iframe>

<!-- GAME (bottom) -->
<iframe 
  id="gameFrame"
  src="index.html"
  style="width:100%; height:35vh; border:0;"
  tabindex="0">
</iframe>

<script>
window.onload = function() {
  const game = document.getElementById("gameFrame");
  game.focus();

  document.body.addEventListener("click", function() {
    game.focus();
  });
};
</script>

</body>
</html>
